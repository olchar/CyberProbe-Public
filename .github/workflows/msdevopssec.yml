name: "Microsoft Security DevOps"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1
        id: msdo
        with:
          # Skip eslint: the MCP TS project has no eslint config and MSDO's
          # bundled eslint exits 2 when it can't parse TypeScript, breaking the
          # whole workflow. Keep the tools that actually cover this repo.
          tools: bandit,checkov,templateanalyzer,trivy

      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
